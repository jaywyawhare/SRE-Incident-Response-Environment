spec_version: 1
name: sre-incident-env
type: coding
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0.0"
description: >
  A reinforcement learning environment where an agent acts as an on-call SRE,
  diagnosing and resolving production incidents in a simulated microservices
  system before SLA timers expire.
author: ""
tags:
  - openenv
  - sre
  - incident-response
  - production
  - real-world

endpoints:
  reset: /reset
  step: /step
  state: /state

reward:
  min: 0.01
  max: 0.99

tasks:
  - id: task_easy
    name: "The OOM Crash"
    description: "Single service OOM after bad deploy. Obvious from metrics."
    difficulty: easy
    max_steps: 25
    weight: 0.3
    grader:
      type: deterministic
      prompt_template: "Score the SRE incident resolution quality 0.0 to 1.0 based on correct root cause identification, fix applied, and speed."
  - id: task_medium
    name: "The Cascade"
    description: "Cascading failure across 3 services. Requires dependency tracing."
    difficulty: medium
    max_steps: 20
    weight: 0.5
    grader:
      type: deterministic
      prompt_template: "Score the SRE incident resolution quality 0.0 to 1.0 based on correct root cause identification, fix applied, and speed."
  - id: task_hard
    name: "The Ghost"
    description: "Intermittent 5% failure from cache corruption. Multiple red herrings."
    difficulty: hard
    max_steps: 15
    weight: 1.0
    grader:
      type: deterministic
      prompt_template: "Score the SRE incident resolution quality 0.0 to 1.0 based on correct root cause identification, fix applied, and speed."

observation_space:
  type: object
  fields:
    step: integer
    max_steps: integer
    sla_seconds_remaining: integer
    alerts: array
    service_metrics: object
    last_action_result: string

action_space:
  type: object
  fields:
    action_type: string
    service: string
    parameters: object
    reasoning: string
    root_cause_description: string
    fix_applied: string
